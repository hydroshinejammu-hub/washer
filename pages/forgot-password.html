<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Forgot Password — DoorstepsWash Jammu</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
</head>
<body>

<header class="header">
  <button class="back-btn" onclick="location.href='account.html'">←</button>
  <div class="header-logo desktop-only-logo" style="display:none"><div class="logo-ic">💧</div>DOORSTEPS<span class="shine">WASH</span> <span style="font-size:.65em;font-weight:600;opacity:.85">JAMMU</span></div>
  <div class="header-title">Forgot Password</div>
  <a href="tel:9469793349" class="call-btn">📞 Call</a>
</header>

<div class="book-box rv" style="margin-top:16px">
  <h2 style="font-size:.95rem;margin-bottom:8px">Reset your password 🔑</h2>
  <p style="font-size:.8rem;color:var(--gray);margin-bottom:18px;line-height:1.7">
    Enter the email address linked to your account. We'll send you a link to reset your password.
  </p>
  <div class="fg">
    <label>Email Address *</label>
    <input class="fc" type="email" id="f_email" placeholder="you@example.com">
    <span class="ferr" id="e_email">Enter a valid email address</span>
  </div>
  <button class="sub-btn" id="subBtn" onclick="sendReset()"><span id="subTxt">📧 Send Reset Link</span><div class="sp" id="subSp"></div></button>
  <div class="toast" id="toastMsg"></div>

  <div style="text-align:center;margin-top:16px">
    <a href="account.html" style="color:var(--teal);font-size:.8rem;font-weight:700">← Back to Login</a>
  </div>
</div>

<script>window.HS_PAGE="account";</script>
<script src="app.js"></script>
<script>
async function sendReset(){
  const email = document.getElementById('f_email').value.trim();
  const ok = vf('f_email','e_email', /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email));
  if(!ok) return;

  if(!BACKEND_URL){
    const t = document.getElementById('toastMsg');
    t.className='toast bad'; t.textContent='❌ Backend not configured yet.'; t.style.display='block';
    return;
  }

  const btn=document.getElementById('subBtn'), txt=document.getElementById('subTxt'), sp=document.getElementById('subSp');
  btn.disabled=true; txt.textContent='Sending…'; sp.style.display='block';

  try{
    const j = await apiPost('/api/forgot-password', {email});
    const t = document.getElementById('toastMsg');
    if(j.success){
      t.className='toast ok';
      t.innerHTML = '✅ ' + (j.message || 'If an account exists with this email, a reset link has been sent. Please check your inbox.');
    } else {
      t.className='toast bad';
      t.textContent = '❌ ' + (j.message || 'Something went wrong.');
    }
    t.style.display='block';
  }catch(e){
    const t = document.getElementById('toastMsg');
    t.className='toast bad'; t.textContent='❌ Connection error. Please try again.'; t.style.display='block';
  }
  btn.disabled=false; txt.textContent='📧 Send Reset Link'; sp.style.display='none';
}
</script>
</body>
</html>
